<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" name="viewport" content="width=device-width,initial-scale=1.0"/>
    <meta http-equiv="Cache-Control" content="no-cache"/>
    <title>Trade Positions</title>
        <link rel="stylesheet" href="./styles.css">        
    </head>
    <body>
        <div id="container">
            <div id="leftContainer">
                <div id="timerBar">
                    <label id="timer"></label>
                </div> 
                <div class="tab-content active">
                    <table id="ocTable">
                        <thead>
                            <tr>
                                <oc-heading></oc-heading>
                            </tr>
                        </thead>
                        <tbody id="ocBody">
                            <tr>
                                <oc-row></oc-row>
                            </tr>
                        </tbody>
                    </table> 
                </div>
                <div class="tab-content">
                    <table id="ocTable2">
                        <thead>
                            <tr>
                                <oc-heading></oc-heading>
                            </tr>
                        </thead>
                        <tbody id="ocBody2">
                            <tr>
                                <oc-row></oc-row>
                            </tr>
                        </tbody>
                    </table> 
                </div>
                <div class="tabs">
                    <div id="tabButton1" class="tab active-tab" onclick="switchExpiry(event, 'Exp1')">
                        <label>Expiry 1</label>
                        <div>
                            <input type="number" id="tpt" name="tpt" style="width: 60px;padding:1px;">
                        </div>
                        <div id="wsc" class="small_button" onclick="wsconnect('connect')">></div>
                        <div id="wsd" class="small_button" onclick="wsconnect('disconnect')">||</div>
                        <div id="socn" class="small_button">@</div>
                    </div>
                    <div id="tabButton2" class="tab" onclick="switchExpiry(event, 'Exp2')">
                        <label>Expiry 2</label>
                        <div id="ocNxt" class="small_button" onclick="runOptionChainNxt(event)">></div>
                    </div>
                </div>
                <div id="positions">    
                    <table id="dataTable">
                    <thead>
                        <tr>
                            <th width="9%">Expiry</th>
                            <th width="9%">Strike</th>
                            <th width="9%">CE/PE</th>
                            <th width="20%">Booked</th>                        
                            <th width="10%">Avg Price</th>
                            <th width="10%">LTP</th>
                            <th colspan="2" width="20%">Unbooked</th>
                            <th width="13%">Total</th>
                        </tr>
                    </thead>    
                    <tbody id="tblBody">
                        <tr>
                            <td><label id="expiry"></label></input></td>
                            <td><label id="strike"></label></input></td>
                            <td><label id="right"></label></td>
                            <td class="order-cell">
                                <label id="BP"></label>
                                
                            </td>
                            <td><label id="AvgP"></label></td>
                            <td><label id="LTP"></label></td>
                            <td><label id="UQ"></label></td>
                            <td><label id="UP"></label></td>
                            <td class="hover-cell">
                                <label id="totalPL"></label>
                                <div  class="hover-content" >
                                    <button  id="buyPE" class="buy_button" onclick="orderPos(event, 'BUY')">B</button>
                                    <button  id="sell" class="sell_button" onclick="orderPos(event, 'SELL')">S</button>
                                </div>
                                <label hidden></label>
                            </td>
                        </tr>
                    </tbody>
                    </table>   
                    </div>
                    <div id="bottomPanel">    
                        <div id="bottomButtons">
                            <button type="button" id="btnLoad" onclick="loadPreData()">Load</button>
                            <button type="button" id="btnStartSim" onclick="start()">Start</button>
                            <button type="button" id="btnStopSim" onclick="stopSimulation()">Stop</button>
                            <button type="button" id="btnResumeSim" onclick="resumeSimulation()">Resume</button>
                            <button type="button" id="btnRefreshPositions" onclick="fetchPositions()">{P}</button>
                            <select id="optionSpeed" onchange="changeSpeed()">
                                <option value="1x">1x</option>
                                <option value="2x">2x</option>
                                <option value="3x">3x</option>
                                <option value="5x">5x</option>
                            </select>
                        </div>

                        <div id="bottomPLPanel">
                            <label class="plLabel" id="bookedPL">Booked: </label>
                            <label class="plAmount" id="vBookedPL">0.00</label>
                            <label class="plLabel" id="unbookedPL">Unbooked: </label>
                            <label class="plAmount" id="vUnbookedPL">0.00</label>
                            <label class="plLabel" id="totalPL">Total: </label>
                            <label class="plAmount" id="vTotalPL">0.00</label>
                        </div>
                    </div>
            </div>

            <div id="rightContainer">
                <div id="chartLinks" class="tabs">
                    <div id="tabLink1" class="tab2  active-tab" onclick="switchChart(event, 'chart', 'chart2')">Futures</div>
                    <div id="tabLink2" class="tab2" onclick="switchChart(event, 'chart2', 'chart')">Options</div>
                </div>
                <div id="chart" class="chart-show">
                </div>
                <div id="chart2" class="chart-hide">
                </div>
            </div> 
        </div>         
    <script src="../data.js"></script>
    <script src="../load.js"></script>
  </body>
</html>
